name: Build APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate JS bundle
        run: node android/generate-bundle.js

      - name: Copy icon fonts
        run: |
          mkdir -p android/app/src/main/assets/fonts
          cp node_modules/@expo/vector-icons/build/vendor/react-native-vector-icons/Fonts/*.ttf android/app/src/main/assets/fonts/

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Download Gradle wrapper
        run: |
          cd android
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Decode release keystore
        if: env.UMA_RELEASE_STORE_BASE64 != ''
        env:
          UMA_RELEASE_STORE_BASE64: ${{ secrets.UMA_RELEASE_STORE_BASE64 }}
        run: |
          echo "$UMA_RELEASE_STORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build release APK
        env:
          UMA_RELEASE_STORE_FILE: ${{ secrets.UMA_RELEASE_STORE_BASE64 != '' && 'release.keystore' || '' }}
          UMA_RELEASE_STORE_PASSWORD: ${{ secrets.UMA_RELEASE_STORE_PASSWORD }}
          UMA_RELEASE_KEY_ALIAS: ${{ secrets.UMA_RELEASE_KEY_ALIAS }}
          UMA_RELEASE_KEY_PASSWORD: ${{ secrets.UMA_RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Find APK files
        id: find_apks
        run: |
          APK_ARM64=$(find android/app/build/outputs/apk/release -name "*arm64*" -type f | head -1)
          APK_ARM32=$(find android/app/build/outputs/apk/release -name "*armeabi*" -type f | head -1)
          echo "apk_arm64=$APK_ARM64" >> $GITHUB_OUTPUT
          echo "apk_arm32=$APK_ARM32" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          NOTES_FILE="release_notes.md"
          if [ -f CHANGELOG.md ]; then
            # Extract the section between "## [VERSION]" and the next "## [" header.
            awk -v ver="$VERSION" '
              $0 ~ "^## \\["ver"\\]" {flag=1; next}
              flag && /^## \[/ {exit}
              flag {print}
            ' CHANGELOG.md > section.md
            if [ -s section.md ]; then
              {
                echo "## UMA Auto+ ${GITHUB_REF#refs/tags/}"
                echo ""
                cat section.md
                echo ""
                echo "---"
                echo ""
                echo "### Install"
                echo "Download the APK that matches your device architecture:"
                echo "- **arm64-v8a** — most modern devices and emulators (recommended)"
                echo "- **armeabi-v7a** — older 32-bit devices"
                echo ""
                echo "Can be installed alongside the upstream steve1316 app without conflicts."
                echo ""
                echo "See the [full changelog](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for the complete history."
              } > "$NOTES_FILE"
            fi
          fi
          # Fallback body if CHANGELOG extraction produced nothing.
          if [ ! -s "$NOTES_FILE" ]; then
            {
              echo "## UMA Auto+ ${GITHUB_REF#refs/tags/}"
              echo ""
              echo "Download the APK for your device architecture:"
              echo "- **arm64-v8a** (recommended for most modern devices and emulators)"
              echo "- **armeabi-v7a** (for older 32-bit devices)"
              echo ""
              echo "### Install"
              echo "Download the APK and install on your Android device or emulator."
              echo "Can be installed alongside the original steve1316 app without conflicts."
            } > "$NOTES_FILE"
          fi
          echo "notes_path=$NOTES_FILE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "UMA Auto+ ${{ steps.version.outputs.version }}"
          body_path: ${{ steps.release_notes.outputs.notes_path }}
          files: |
            ${{ steps.find_apks.outputs.apk_arm64 }}
            ${{ steps.find_apks.outputs.apk_arm32 }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
